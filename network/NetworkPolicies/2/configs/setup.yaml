apiVersion: v1
kind: Namespace
metadata:
  name: np-2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: np-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: np-2
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: np-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: curl
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              while true; do
                echo -n "[frontend->backend:80] "
                curl -s --max-time 3 http://backend.np-2.svc.cluster.local && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 3
              done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: other
  namespace: np-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: other
  template:
    metadata:
      labels:
        app: other
    spec:
      containers:
        - name: curl
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              while true; do
                echo -n "[other->backend:80] "
                curl -s --max-time 3 http://backend.np-2.svc.cluster.local && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 3
              done
