apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: network-policy-3
  namespace: np-3-backend
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: np-3-trusted