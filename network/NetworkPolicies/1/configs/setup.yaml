apiVersion: v1
kind: Namespace
metadata:
  name: np-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: np-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: np-1
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: np-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: curl
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              while true; do
                echo -n "[web:80] "
                curl -s --max-time 3 http://web.np-1.svc.cluster.local && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 3
              done
