apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: full-reference
  namespace: my-namespace
spec:

  # ── Selector: which pods THIS policy applies to ──────────────────────────────
  podSelector:
    matchLabels:
      app: backend         # specific pod
  # podSelector: {}        # all pods in namespace

  policyTypes:
    - Ingress
    - Egress

  # ═══════════════════════════════════════════════════════════════════════════
  # INGRESS — who can send traffic TO selected pods
  # ═══════════════════════════════════════════════════════════════════════════
  ingress:

    # ── Rule 1: allow from specific pod (same namespace) ─────────────────────
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 80

    # ── Rule 2: allow from entire namespace ──────────────────────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: team-a

    # ── Rule 3: AND — specific pod AND specific namespace ────────────────────
    #   (one list item = AND)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: team-b
          podSelector:                              # same dash as namespaceSelector = AND
            matchLabels:
              role: trusted

    # ── Rule 4: OR — from namespace A OR pods with label role=admin ──────────
    #   (two list items = OR)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: team-c
        - podSelector:                             # separate dash = OR
            matchLabels:
              role: admin

    # ── Rule 5: allow from all pods in all namespaces ────────────────────────
    - from:
        - namespaceSelector: {}   # all namespaces
          podSelector: {}         # all pods  → AND = everyone

    # ── Rule 6: port range ───────────────────────────────────────────────────
    - from:
        - podSelector:
            matchLabels:
              app: monitoring
      ports:
        - protocol: TCP
          port: 8080
          endPort: 8090           # ports 8080–8090 inclusive

    # ── Rule 7: multiple ports ───────────────────────────────────────────────
    - from:
        - podSelector:
            matchLabels:
              app: loadbalancer
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8443

    # ── Rule 8: allow from specific pod in specific namespace on specific port─
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: team-d
          podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 9000

    # ── Rule 9: matchExpressions (when you need In/NotIn/Exists) ─────────────
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: environment
                operator: In
                values: ["staging", "production"]
          podSelector:
            matchExpressions:
              - key: role
                operator: NotIn
                values: ["debug"]

    # ── Rule 10: allow ALL ingress (no from = allow from anywhere) ───────────
    - {}

  # ═══════════════════════════════════════════════════════════════════════════
  # EGRESS — where selected pods can send traffic TO
  # ═══════════════════════════════════════════════════════════════════════════
  egress:

    # ── Rule 1: DNS — always add when using Egress (needed for svc resolution)─
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # ── Rule 2: allow to specific namespace ──────────────────────────────────
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: team-backend
      ports:
        - protocol: TCP
          port: 8080

    # ── Rule 3: allow to specific pod in specific namespace (AND) ─────────────
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: team-db
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432

    # ── Rule 4: allow to external IP (outside cluster) ───────────────────────
    - to:
        - ipBlock:
            cidr: 203.0.113.0/24
            except:
              - 203.0.113.5/32    # exclude specific IP from the range
      ports:
        - protocol: TCP
          port: 443

    # ── Rule 5: allow to multiple destinations on different ports (OR) ────────
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: team-a
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: team-b
      ports:
        - protocol: TCP
          port: 80

    # ── Rule 6: allow ALL egress (no to = allow to anywhere) ─────────────────
    - {}

# ═══════════════════════════════════════════════════════════════════════════════
# QUICK REFERENCE
# ═══════════════════════════════════════════════════════════════════════════════
#
# AND vs OR in from/to:
#   - namespaceSelector: ...    ← one dash
#     podSelector: ...          ← no dash (same item) → AND
#
#   - namespaceSelector: ...    ← dash
#   - podSelector: ...          ← separate dash → OR
#
# policyTypes behaviour:
#   [Ingress]        → only ingress controlled, egress fully open
#   [Egress]         → only egress controlled, ingress fully open
#   [Ingress,Egress] → both controlled
#
# Empty rules:
#   policyTypes: [Ingress]          → deny ALL ingress (no ingress rules = empty whitelist)
#   ingress: [{}]                   → allow ALL ingress from anywhere
#   policyTypes: [Ingress, Egress]  → deny ALL in both directions
#
# podSelector: {}    → selects ALL pods in namespace
# namespaceSelector: {} → selects ALL namespaces
#
# DNS must be explicitly allowed in egress if policyTypes includes Egress.
# kube-dns lives in kube-system — allow port 53 without destination restriction.
