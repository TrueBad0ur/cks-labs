apiVersion: v1
kind: Namespace
metadata:
  name: np-3-backend
---
apiVersion: v1
kind: Namespace
metadata:
  name: np-3-trusted
---
apiVersion: v1
kind: Namespace
metadata:
  name: np-3-untrusted
---
# api in backend namespace
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: np-3-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: np-3-backend
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 80
---
# caller in trusted namespace
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caller
  namespace: np-3-trusted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caller
  template:
    metadata:
      labels:
        app: caller
    spec:
      containers:
        - name: curl
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              while true; do
                echo -n "[trusted/caller->api:80] "
                curl -s --max-time 3 http://api.np-3-backend.svc.cluster.local && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 3
              done
---
# intruder in untrusted namespace
apiVersion: apps/v1
kind: Deployment
metadata:
  name: intruder
  namespace: np-3-untrusted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intruder
  template:
    metadata:
      labels:
        app: intruder
    spec:
      containers:
        - name: curl
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              while true; do
                echo -n "[untrusted/intruder->api:80] "
                curl -s --max-time 3 http://api.np-3-backend.svc.cluster.local && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 3
              done
