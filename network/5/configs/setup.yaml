apiVersion: v1
kind: Namespace
metadata:
  name: np-5-worker
---
apiVersion: v1
kind: Namespace
metadata:
  name: np-5-allowed
---
apiVersion: v1
kind: Namespace
metadata:
  name: np-5-blocked
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: target
  namespace: np-5-allowed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: target
  template:
    metadata:
      labels:
        app: target
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: target
  namespace: np-5-allowed
spec:
  selector:
    app: target
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blocked
  namespace: np-5-blocked
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blocked
  template:
    metadata:
      labels:
        app: blocked
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: blocked
  namespace: np-5-blocked
spec:
  selector:
    app: blocked
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: np-5-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: curl
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              while true; do
                echo -n "[->allowed] "
                curl -s --max-time 3 http://target.np-5-allowed.svc.cluster.local && echo "OK" || echo "FAIL/TIMEOUT"
                echo -n "[->blocked] "
                curl -s --max-time 3 http://blocked.np-5-blocked.svc.cluster.local && echo "OK" || echo "FAIL/TIMEOUT"
                sleep 3
              done
